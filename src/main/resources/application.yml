server:
  port: 8080
  tomcat:
    threads:
      max: 50
      min-spare: 10
    accept-count: 100
    connection-timeout: 5000
    max-connections: 800
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:h2:mem:productdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 3000
      idle-timeout: 30000
      max-lifetime: 60000

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20

  h2:
    console:
      enabled: true
      path: /h2-console

  # ── Cache: Caffeine (local dev — no Redis needed) ──────────────────────────
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,threaddump,heapdump,env
  endpoint:
    health:
      show-details: always
    heapdump:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

resilience4j:
  ratelimiter:
    instances:
      productApi:
        limit-for-period: 150
        limit-refresh-period: 1s
        timeout-duration: 0
        register-health-indicator: true

logging:
  level:
    # Your app — INFO shows [CACHE MISS], [DB], [429], [RES] slow/error lines
    # Switch to DEBUG to also see [REQ] every request and [CACHE] evictions
    com.demo.productservice: INFO

    # See Spring's cache proxy decisions (CACHE HIT / CACHE MISS at framework level)
    org.springframework.cache: WARN  # switch to DEBUG during cache debugging

    # Hibernate SQL — switch to DEBUG to see every query during load test
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

    # Resilience4j internal — switch to DEBUG to trace permit decisions
    io.github.resilience4j: WARN

    # Suppress noisy Spring web logs
    org.springframework.web: WARN

  # Pattern includes thread name — during load test you'll see
  # http-nio-8080-exec-1 through exec-50 (your 50 Tomcat threads)
  # If you see exec-1 through exec-50 ALL active at once → thread pool at limit
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %-40logger{40} - %msg%n"
